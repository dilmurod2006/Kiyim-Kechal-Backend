name: CD - Deploy to EC2

# Deploys to the AWS EC2 server over SSH.
# Runs automatically AFTER the "CI" workflow succeeds on the main branch,
# so broken code never reaches production. Can also be run manually.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# Never run two deployments at the same time.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    # Only deploy if CI passed (or if triggered manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Optional: set EC2_SSH_PORT secret if you changed the SSH port.
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            APP_DIR="${APP_DIR:-$HOME/Kiyim-Kechal-Backend}"

            echo "==> Deploying in $APP_DIR"
            cd "$APP_DIR"

            echo "==> Pulling latest code"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Building and starting containers"
            docker compose -f compose.prod.yaml up -d --build --remove-orphans

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Current status"
            docker compose -f compose.prod.yaml ps
