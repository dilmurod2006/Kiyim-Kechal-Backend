# Production stack for a single host (e.g. an AWS EC2 instance).
# The image is built on the server; configuration comes from .env.prod
# (which lives only on the server, never in git).
#
# Only the API port (8000) is published. Postgres and Redis stay on the
# internal Docker network and are NOT reachable from the public internet.

services:
  db:
    image: postgres:15
    env_file: .env.prod
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply DB migrations, then seed (idempotent). If seeding fails
  # the API still starts, as long as the schema migration succeeded.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: fastapi-ecom-backend:latest
    command: >
      sh -c "alembic upgrade head &&
             { python seed.py || echo '[seed] seeding step failed - continuing'; }"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: fastapi-ecom-backend:latest
    command: >
      gunicorn main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
    env_file: .env.prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: fastapi-ecom-backend:latest
    command: celery -A worker.celery_app worker -I tasks --loglevel=info
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  app-network:
    driver: bridge
