# Nginx reverse proxy for the FastAPI backend.
#
# The API runs in Docker on 127.0.0.1:8000; nginx terminates HTTP/HTTPS on the
# public domain and forwards requests to it.
#
# IMPORTANT: do NOT add CORS headers here — the FastAPI app already sets them.
# Adding them in nginx too would send duplicate headers and break CORS.
#
# Install:
#   sudo cp deploy/nginx/api.gastro-analytics.uz.conf /etc/nginx/sites-available/api.conf
#   sudo ln -sf /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/api.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then enable HTTPS automatically with certbot:
#   sudo certbot --nginx -d api.gastro-analytics.uz
# (certbot rewrites this file to add the :443 block and an http->https redirect.)

server {
    listen 80;
    listen [::]:80;

    # 👉 change this to your API subdomain (DNS A record must point to the EC2 IP)
    server_name api.gastro-analytics.uz;

    # Allow reasonably sized uploads/JSON bodies.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive support (harmless if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
