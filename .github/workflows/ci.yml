name: CI

# Runs on every pull request and on pushes to main.
# Goal: catch real bugs (syntax / undefined names) and make sure the
# production Docker image actually builds and boots before we ever deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      # Only fail on real errors: syntax errors (E9) and undefined / unused-import
      # bugs (F). Style nits are reported but do not break the build.
      - name: Lint for critical errors
        run: ruff check . --select E9,F63,F7,F82,F821,F401 --output-format=github

  build:
    name: Build & smoke test image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          tags: fastapi-ecom-backend:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot container and hit root endpoint)
        run: |
          docker run -d --name api_smoke \
            -e SECRET_KEY=ci-dummy-secret \
            -e ALGORITHM=HS256 \
            -p 8000:8000 \
            fastapi-ecom-backend:ci

          echo "Waiting for the API to come up..."
          for i in $(seq 1 20); do
            if curl -fs http://localhost:8000/ >/dev/null; then
              echo "API is up."
              curl -s http://localhost:8000/
              exit 0
            fi
            sleep 2
          done

          echo "API failed to start. Container logs:"
          docker logs api_smoke
          exit 1

      - name: Clean up
        if: always()
        run: docker rm -f api_smoke || true
